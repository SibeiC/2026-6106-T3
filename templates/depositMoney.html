<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    />
</head>

<body>
    <div class="container">
        <h2>Deposit Money</h2>

        <input
            type="text"
            id="depositAddress"
            placeholder="Enter Deposit Address"
        />
        <input type="text" id="amount" placeholder="Enter Amount" />

        <button class="btn" onclick="deposit()">Deposit</button>
        <button class="btn" onclick="transaction()">View Transaction</button>

        <form action="/main" method="post">
            <input type="submit" value="Main" />
        </form>

        <p id="view_depositAddress"></p>
        <p id="view_amount"></p>

        <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>

        <script>
            const contractAddress =
                "0xafea4a292b61eef5381d8c4c565649bd0ff6587f";
            const contractABI = [
                {
                    inputs: [
                        {
                            internalType: "address",
                            name: "_depositAddress",
                            type: "address",
                        },
                        {
                            internalType: "uint256",
                            name: "_amount",
                            type: "uint256",
                        },
                    ],
                    name: "init",
                    outputs: [],
                    stateMutability: "payable",
                    type: "function",
                },
                {
                    inputs: [],
                    name: "checkTxn",
                    outputs: [
                        {
                            internalType: "address",
                            name: "",
                            type: "address",
                        },
                        {
                            internalType: "uint256",
                            name: "",
                            type: "uint256",
                        },
                    ],
                    stateMutability: "view",
                    type: "function",
                },
            ];

            const web3 = new Web3(Web3.givenProvider);
            const contract = new web3.eth.Contract(
                contractABI,
                contractAddress,
            );

            async function deposit() {
                const accounts = await web3.eth.requestAccounts();
                const depositAddress =
                    document.getElementById("depositAddress").value;
                const amount = document.getElementById("amount").value;

                console.log(depositAddress, amount);

                await contract.methods
                    .init(depositAddress, amount)
                    .send({ from: accounts[0] });
            }

            async function transaction() {
                const result = await contract.methods.checkTxn().call();
                const depositAddress = result[0];
                const amount = result[1];

                document.getElementById("view_depositAddress").textContent =
                    `Deposit Address is ${depositAddress}`;
                document.getElementById("view_amount").textContent =
                    `Amount is ${amount}`;
            }
        </script>
    </div>
</body>
