<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    />
</head>

<body>
    <div class="container">
        <h2>Transfer Money</h2>

        <input type="text" id="payer" placeholder="Enter Payer Address" />
        <input type="text" id="payee" placeholder="Enter Payee Address" />
        <input type="text" id="amount" placeholder="Enter Amount" />

        <button class="btn" onclick="transfer()">Transfer</button>
        <button class="btn" onclick="transaction()">View Transaction</button>

        <form action="/main" method="post">
            <input type="submit" value="Main" />
        </form>

        <p id="view_payer"></p>
        <p id="view_payee"></p>
        <p id="view_amount"></p>

        <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>

        <script>
            const contractAddress =
                "0x624ce155e9c16a9c2ef3983ef10cf863d860c97c";
            const contractABI = [
                {
                    inputs: [
                        {
                            internalType: "address",
                            name: "_payer",
                            type: "address",
                        },
                        {
                            internalType: "address",
                            name: "_payee",
                            type: "address",
                        },
                        {
                            internalType: "uint256",
                            name: "_amount",
                            type: "uint256",
                        },
                    ],
                    name: "weixin",
                    outputs: [],
                    stateMutability: "payable",
                    type: "function",
                },
                {
                    inputs: [],
                    name: "checkTxn",
                    outputs: [
                        {
                            internalType: "address",
                            name: "",
                            type: "address",
                        },
                        {
                            internalType: "address",
                            name: "",
                            type: "address",
                        },
                        {
                            internalType: "uint256",
                            name: "",
                            type: "uint256",
                        },
                    ],
                    stateMutability: "view",
                    type: "function",
                },
            ];
            const web3 = new Web3(Web3.givenProvider);
            const contract = new web3.eth.Contract(
                contractABI,
                contractAddress,
            );

            async function transfer() {
                const accounts = await web3.eth.requestAccounts();
                const payer = document.getElementById("payer").value;
                const payee = document.getElementById("payee").value;
                const amount = document.getElementById("amount").value;

                console.log(payer, payee, amount);

                await contract.methods.weixin(payer, payee, amount).send({
                    from: accounts[0],
                });
            }

            async function transaction() {
                const result = await contract.methods.checkTxn().call();
                const payer = result[0];
                const payee = result[1];
                const amount = result[2];

                document.getElementById("view_payer").textContent =
                    `Payer is ${payer}`;
                document.getElementById("view_payee").textContent =
                    `Payee is ${payee}`;
                document.getElementById("view_amount").textContent =
                    `Amount is ${amount}`;
            }
        </script>
    </div>
</body>
